name: Build Height Meter APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build installable APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk HeightMeter-v1.1.0.apk

      - name: Upload APK for Chrome download
        uses: actions/upload-artifact@v4
        with:
          name: HeightMeter-Android-v1.1.0-APK
          path: HeightMeter-v1.1.0.apk
          if-no-files-found: error
          retention-days: 30
